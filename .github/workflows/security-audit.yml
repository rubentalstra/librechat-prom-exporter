name: Security Audit
on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  dependency-security:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    # Hoist the secret into a job-level env so step `if:` conditions can
    # reference it. GitHub Actions does not allow `secrets.X` directly in
    # `if:` expressions — `env.X` is the supported pattern.
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit vulnerabilities with npm
        run: npm audit --production --audit-level=high

      - name: (Optional) Scan for vulnerabilities with Snyk
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@v1
        with:
          args: --severity-threshold=high

      - name: List outdated dependencies (informational)
        run: npm outdated || true
