name: Test docs build

# PR-only docs build verification. onBrokenLinks / onBrokenAnchors /
# onBrokenMarkdownLinks are all set to "throw" so this catches broken
# refs and stale frontmatter at PR review, not after merge.

on:
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - "CONTRIBUTING.md"
      - ".github/workflows/docs-test-deploy.yml"

permissions:
  contents: read

jobs:
  test-build:
    name: Test build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter ./website typecheck

      - name: Build
        run: pnpm --filter ./website build
