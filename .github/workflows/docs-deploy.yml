name: Deploy docs to GitHub Pages

# Builds the Docusaurus site under ./website and deploys to GitHub Pages.
# Path-filtered so commits that don't touch docs don't waste CI minutes.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "CONTRIBUTING.md"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          # Required so Docusaurus can read git history for the
          # "Last updated" author + timestamp on every doc page.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter ./website typecheck

      - name: Build
        run: pnpm --filter ./website build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
