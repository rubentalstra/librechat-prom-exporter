name: CI & Code Quality
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  static_analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (SARIF)
        run: |
          npx eslint . --ext .ts --config eslint.config.mjs \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint_results.sarif || true

      - name: Run depcheck
        run: npx depcheck > depcheck_results.txt || true

      - name: Run ts-prune
        run: npx ts-prune > tsprune_results.txt || true

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint_results.sarif
        continue-on-error: true

      - name: Upload Code Quality Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-quality-results
          path: |
            eslint_results.sarif
            depcheck_results.txt
            tsprune_results.txt
          if-no-files-found: ignore

  # Build the Docker image on every PR so Dockerfile regressions surface
  # at review time, not after merge when CD tries to publish. Single-arch
  # for speed; CD covers linux/amd64+linux/arm64.
  docker_build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
