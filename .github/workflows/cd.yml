name: CD
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing via Sigstore
  attestations: write # GitHub-native build attestations

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # docker/metadata-action handles latest / version-tag / branch logic
      # automatically — no more bash heredocs.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single multi-arch build + push. Buildx emits SLSA provenance and
      # SBOM attestations into the registry automatically.
      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # Sign every published tag with Sigstore keyless cosign.
      # Verifiable downstream via:
      #   cosign verify --certificate-identity-regexp='https://github.com/<repo>/' \
      #                 --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
      #                 ghcr.io/<repo>:latest
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      # Scan the pushed image. Report-only: findings flow to GitHub's
      # Code Scanning UI but never block the deploy, because base-image
      # CVEs are out of our control and rebuild cadence varies. App-layer
      # CRITICALs are gated by `npm audit` during the build (npm ci fails
      # the build if it finds them) and the weekly Security Audit job.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: "os,library"
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
        continue-on-error: true

      # SBOM artifact + attach to GitHub Release on version tags.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      - name: Attach SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: sbom.spdx.json
