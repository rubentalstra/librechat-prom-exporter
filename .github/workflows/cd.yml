name: CD
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # for cosign keyless signing
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          set -euo pipefail
          if [ "$IS_TAG" = "true" ]; then
            echo "primary=$IMAGE_REF:$REF_NAME" >> "$GITHUB_OUTPUT"
            {
              echo 'all<<EOF'
              echo "$IMAGE_REF:$REF_NAME"
              echo "$IMAGE_REF:latest"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "primary=$IMAGE_REF:latest" >> "$GITHUB_OUTPUT"
            {
              echo 'all<<EOF'
              echo "$IMAGE_REF:latest"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build image (single-arch, for Trivy scan gate)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ steps.tags.outputs.primary }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Report-only scan: report findings to Security tab without blocking
      # the push. Distroless / upstream Debian rebuilds can lag CVE fixes by
      # days; gating every deploy is impractical for a single-maintainer
      # project. App-code vulnerabilities are caught by `npm audit` + the
      # weekly Security Audit workflow; image-layer findings here go to
      # GitHub Code Scanning for review.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.primary }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      # Hard-gate only on CRITICAL findings in app dependencies (not OS
      # packages from the base image, which we don't control).
      - name: Hard-fail on CRITICAL app-layer vulns
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.primary }}
          format: table
          severity: CRITICAL
          vuln-type: library
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
        continue-on-error: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.all }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless via Sigstore)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.tags.outputs.all }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.primary }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      - name: Attach SBOM to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: sbom.spdx.json
