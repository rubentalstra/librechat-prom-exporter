name: Lighthouse on docs

# PR-only audit. Thresholds + URL list live in website/lighthouserc.json.

on:
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs-lighthouse.yml"

permissions:
  contents: read

jobs:
  lighthouse:
    name: Audit
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: "./website/lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true
