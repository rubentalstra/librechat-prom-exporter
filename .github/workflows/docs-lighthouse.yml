name: Lighthouse on docs

# PR-only audit. Thresholds + URL list live in website/lighthouserc.json.

on:
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs-lighthouse.yml"

permissions:
  contents: read

jobs:
  lighthouse:
    name: Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (baseUrl=/ so lhci's static server can serve at root)
        env:
          LIGHTHOUSE_BUILD: "true"
        run: pnpm --filter ./website build

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: "./website/lighthouserc.cjs"
          uploadArtifacts: true
          temporaryPublicStorage: true
