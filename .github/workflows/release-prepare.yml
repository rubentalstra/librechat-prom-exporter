name: Prepare release

# Opens a "Release vX.Y.Z" PR with the docs snapshot + version bump.
# Full release flow lives in CONTRIBUTING.md → "Cutting a release".

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver, no leading 'v'). E.g. 0.9.0"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version input
        run: |
          set -euo pipefail
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid version '$VERSION'. Expected semver like 0.9.0 or 0.9.0-rc.1." >&2
            exit 1
          fi
          echo "MAJOR_MINOR=${VERSION%.*}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Bump root package.json
        run: pnpm version --no-git-tag-version "$VERSION"

      - name: Install (workspace, root)
        run: pnpm install --frozen-lockfile

      - name: Snapshot docs site
        run: |
          set -euo pipefail
          if [ -d "website/versioned_docs/version-${MAJOR_MINOR}" ]; then
            echo "Snapshot version-${MAJOR_MINOR} already exists; skipping."
          else
            pnpm --filter ./website docusaurus docs:version "$MAJOR_MINOR"
          fi

      # Note: PRs opened with GITHUB_TOKEN do NOT trigger other workflows
      # (GitHub anti-loop protection). To run CI on the release PR, either
      # push an empty commit after it opens, or use a PAT / GitHub App
      # token here. See peter-evans/create-pull-request "Triggering
      # further workflow runs" docs.
      - name: Open release PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/v${{ inputs.version }}
          base: main
          commit-message: "chore(release): v${{ inputs.version }}"
          title: "Release v${{ inputs.version }}"
          labels: release
          delete-branch: true
          body: |
            Automated release-prep PR for **v${{ inputs.version }}**.

            - Bumps `package.json` + `pnpm-lock.yaml` to `${{ inputs.version }}`.
            - Snapshots the docs site as version `${{ env.MAJOR_MINOR }}` (no-op if it already exists).

            ### After merging

            Tag the merge commit and push it:

            ```bash
            git fetch origin main
            git tag v${{ inputs.version }} origin/main
            git push origin v${{ inputs.version }}
            ```

            Or use the GitHub UI: **Releases → Draft a new release → tag `v${{ inputs.version }}` on `main` → Generate release notes → Publish**.

            CD will then run automatically: multi-arch build, cosign sign, attest build-provenance + SBOM, Trivy scan, attach SBOM to the Release.
